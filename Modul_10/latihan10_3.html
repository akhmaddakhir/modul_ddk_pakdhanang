<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 10.3</title>
</head>

<body>
    <h2>Javascript HTML DOM</h2>
    <p>Finding HTML Elements ny Class Name.</p>
    <p class="intro">Hello World!</p>
    <p class="intro">This example demonstrates the <b>getElementByClassName</b> method.</p>
    <p id="demo"></p>
    <script>
        const x = document.getElementByClassName("intro");
        document.getElementById("demo").innerHTML = 'The first paragraph (index 0) with class = "intro" is: ' + x[0].innerHTML;
    </script>
</body>

</html>
