<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 10.2</title>
</head>

<body>
    <p>Hello World!</p>
    <div id="main">
        <p>The DOM is very useful.</p>
        <p>This example demonstrates the <b>getElementByTagName</b> method</p>
    </div>

    <p id="demo"></p>
    <script>
        var x = document.getElementById("main");

        var y = x.getElementsByTagName("p");

        document.getElementById("demo").innerHTML = 'The first paragraph inside "main" is ' + y[0].innerHTML;
    </script>
</body>

</html>
