<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tugas_Mandiri_Modul6_2</title>
  </head>
  <link rel="stylesheet" href="Tugas_Mandiri_6.2.css" />
  <body class="tugas-mandiri-2">
    <h1 align="left">FORMULIR PENDAFTARAN</h1>
    <table border="0" cellpadding="5" cellspacing="0">
      <form method="post" action="">
        <br />

        <tr>
          <td class="subjudul">Nama</td>
          <td>:</td>
          <td><input type="text" name="var1" size="40" value="" class="nama" /></td>
        </tr>

        <tr>
          <td class="subjudul">Password</td>
          <td>:</td>
          <td><input type="password" name="var2" size="40" value="" class="password" /></td>
        </tr>

        <tr>
          <td class="subjudul">Tanggal Lahir</td>
          <td>:</td>
          <td>
            <input type="text" name="var3" size="1" value="" class="tanggal-lahir" /> /
            <input type="text" name="var3" size="1" value="" class="tanggal-lahir" /> /
            <input type="text" name="var4" size="2" value="" class="tanggal-lahir" />
          </td>
        </tr>

        <tr>
          <td class="subjudul">Jenis Kelamin</td>
          <td>:</td>
          <td>
            <input type="radio" name="var5" value="r1" /> Laki-Laki
            <input type="radio" name="var5" value="r2" /> Perempuan
          </td>
        </tr>

        <tr>
          <td class="subjudul">Jurusan</td>
          <td>:</td>
          <td>
            <select name="var6" size="1" class="jurusan">
              <option value="RPL">RPL</option>
              <option value="TKJ">TKJ</option>
              <option value="DKV">DKV</option>
              <option value="ANIM">ANIMASI</option>
              <option value="TL">TEKNIK LOGISTIK</option>
              <option value="TG" selected>TEKNIK GRAFIKA</option>
              <option value="TM">TEKNIK MEKATRONIKA</option>
              <option value="PH">PERHOTELAN</option>
            </select>
          </td>
        </tr>

        <tr>
          <td class="subjudul">Hobi</td>
          <td>:</td>
          <td>
            <input type="checkbox" name="var7" /> Mancing
            <input type="checkbox" name="var7" /> Push rank
            <input type="checkbox" name="var7" /> Marah
            <br />

            <input type="checkbox" name="var7" /> Tidur
            <input type="checkbox" name="var7" /> Olahraga
            <input type="checkbox" name="var7" /> Dengerin Radiohead
          </td>
        </tr>

        <tr>
          <td class="subjudul">Alamat</td>
          <td>:</td>
          <td><textarea name="var8" cols="40" rows="6"> </textarea></td>
        </tr>

        <tr>
          <td></td>
          <td></td>

          <td align="center">
            <input type="submit" name="var9" value="Send" align="center" class="send" />
            <input type="reset" name="var9" value="Cancel" align="center" class="cancel" />
          </td>
        </tr>
      </form>
    </table>
  </body>
</html>
