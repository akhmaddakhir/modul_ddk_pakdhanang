<!doctype html>
<html>
  <head>
    <title>Tugas_Mandiri_Modul4</title>
  </head>

  <body>
    <h2 align="left">FORMULIR PENDAFTARAN</h2>
    <table border="0" cellpadding="5" cellspacing="0">
      <form method="post" action="">
        <br />

        <tr>
          <td>Nama</td>
          <td>:</td>
          <td><input type="text" name="var1" size="40" value="" /></td>
        </tr>

        <tr>
          <td>Password</td>
          <td>:</td>
          <td>
            <input
              type="text"
              style="background-color: lightyellow"
              name="var2"
              size="40"
              value="********" />
          </td>
        </tr>

        <tr>
          <td>Tanggal Lahir</td>
          <td>:</td>
          <td>
            <input type="text" name="var3" size="1" value="" /> /
            <input type="text" name="var3" size="1" value="" /> /
            <input type="text" name="var4" size="2" value="" />
          </td>
        </tr>

        <tr>
          <td>Jenis Kelamin</td>
          <td>:</td>
          <td>
            <input type="radio" name="var5" value="r1" /> Laki-Laki
            <input type="radio" name="var5" value="r2" /> Perempuan
          </td>
        </tr>

        <tr>
          <td>Jurusan</td>
          <td>:</td>
          <td>
            <select style="background-color: lightgray" name="var6" size="1">
              <option value="RPL">RPL</option>
              <option value="TKJ">TKJ</option>
              <option value="DKV">DKV</option>
              <option value="ANIM">ANIMASI</option>
              <option value="TL">TEKNIK LOGISTIK</option>
              <option value="TG" selected>TEKNIK GRAFIKA</option>
              <option value="TM">TEKNIK MEKATRONIKA</option>
              <option value="PH">PERHOTELAN</option>
            </select>
          </td>
        </tr>

        <tr>
          <td>Hobi</td>
          <td>:</td>
          <td>
            <input type="checkbox" name="var7" /> Mancing
            <input type="checkbox" name="var7" /> Push rank
            <input type="checkbox" name="var7" /> Marah
            <br />

            <input type="checkbox" name="var7" /> Tidur
            <input type="checkbox" name="var7" /> Olahraga
            <input type="checkbox" name="var7" /> Dengerin Radiohead
          </td>
        </tr>

        <tr>
          <td>Alamat</td>
          <td>:</td>
          <td><textarea name="var8" cols="40" rows="6"> </textarea></td>
        </tr>

        <tr>
          <td></td>
          <td></td>

          <td align="center">
            <input type="submit" name="var9" value="Send" align="center" />
            <input type="reset" name="var9" value="Cancel" align="center" />
          </td>
        </tr>
      </form>
    </table>
  </body>
</html>
