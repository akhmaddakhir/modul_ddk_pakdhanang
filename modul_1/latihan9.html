<!doctype html>
<html>
  <head>
    <title>Tag OL dengan TYPE</title>
  </head>
  <body>
    <b>Dengan huruf kapital:</b>
    <ol type="A">
      <li>Jogja</li>
      <br />
      <li>Solo</li>
      <br />
    </ol>
    <hr />
    <b>Dengan angka romawi:</b><br />
    <ol type="i">
      <li>Ngawi</li>
      <br />
      <li>Magelang</li>
      <br />
    </ol>
  </body>
</html>
