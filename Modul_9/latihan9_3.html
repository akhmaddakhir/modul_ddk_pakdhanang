<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 9.3</title>
</head>

<body>
    <script>
        let buah = ["Apel", "Jeruk", "Mangga", "Pisang"];
        document.write("<h3>Daftar Buah</h3>");
        document.write("<ol>");

        buah.forEach(function (item, index) {
            document.write(index + 1 + ". " + item + "<br>");
        });
        document.write("</ol>");0
    </script>
</body>

</html>
