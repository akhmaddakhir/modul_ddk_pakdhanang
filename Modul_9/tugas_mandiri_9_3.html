<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Mandiri 9.3</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #222;
        }

        h2 {
            color: #555;
            margin-top: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #4caf50;
            color: #fff;
        }
    </style>
</head>

<body>
    <h1>Data Nama Siswa RPL</h1>
    <h2>SMK Negeri 4 Malang</h2>

    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>NIS</th>
                <th>Nama Siswa</th>
                <th>Kelas</th>
            </tr>
        </thead>
        <tbody id="tabelSiswa"></tbody>
    </table>

    <script>
        const dataSiswa = [
            { no: 1, nis: 1001, nama: "Andi", kelas: "X RPL A" },
            { no: 2, nis: 1002, nama: "Budi", kelas: "X RPL B" },
            { no: 3, nis: 1003, nama: "Citra", kelas: "X RPL C" },
            { no: 4, nis: 1004, nama: "Dewi", kelas: "XI RPL A" }
        ];

        for (let i = 0; i < dataSiswa.length; i++) {
            const tr = document.createElement('tr');

            const tdNo = document.createElement('td');
            tdNo.textContent = dataSiswa[i].no;

            const tdNis = document.createElement('td');
            tdNis.textContent = dataSiswa[i].nis;

            const tdNama = document.createElement('td');
            tdNama.textContent = dataSiswa[i].nama;

            const tdKelas = document.createElement('td');
            tdKelas.textContent = dataSiswa[i].kelas;

            tr.appendChild(tdNo);
            tr.appendChild(tdNis);
            tr.appendChild(tdNama);
            tr.appendChild(tdKelas);

            document.getElementById('tabelSiswa').appendChild(tr);
        }
    </script>
</body>

</html>
